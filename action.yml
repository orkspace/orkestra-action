name: "Orkestra CI"
description: "Run Orkestra CLI commands in CI with versioned reproducibility"

inputs:
  katalog:
    description: "Path to existing katalog.yaml or komposer.yaml (ignored if init=true)"
    required: false
    default: ""

  init:
    description: "Initialize a new operator using the specified pack and example-subdir"
    required: false
    default: "false"

  pack:
    description: "Pack to use when init=true (beginner, intermediate, advanced, use-cases)"
    required: false
    default: "beginner"

  example-subdir:
    description: "Subdirectory under examples/<pack> containing the katalog, CRD, and CR (required if init=true)"
    required: false
    default: ""

  ork-version:
    description: "Version of Ork CLI to use (e.g. v1.2.3, latest)"
    required: false
    default: "latest"

  output-dir:
    description: "Directory to write artifacts into"
    required: false
    default: "orkestra-artifacts"

  kompose:
    description: "Run 'ork kompose' before other steps"
    required: false
    default: "false"

  validate:
    description: "Run 'ork validate'"
    required: false
    default: "false"

  template:
    description: "Run 'ork template'"
    required: false
    default: "false"

  generate-rbac:
    description: "Run 'ork generate rbac'"
    required: false
    default: "false"

  generate-configmap:
    description: "Run 'ork generate configmap'"
    required: false
    default: "false"
  
  namespace:
    description: "Kubernetes namespace for the generated bundle (default: orkestra-system)"
    required: false
    default: "orkestra-system"

  generate-bundle:
    description: "Run 'ork generate bundle'"
    required: false
    default: "false"
  
  generate-registry:
    description: "Run 'ork generate registry' for typed operators"
    required: false
    default: "false"

outputs:
  komposed_katalog:
    description: "Path to the komposed katalog.yaml"
  validate_log:
    description: "Path to validation log"
  template_dir:
    description: "Directory containing rendered templates"
  rbac_file:
    description: "Generated RBAC YAML file"
  configmap_file:
    description: "Generated ConfigMap YAML file"
  bundle_file:
    description: "Generated bundle YAML file"
  init_dir:
    description: "Root directory of the initialized operator (only if init=true)"
  operator_dir:
    description: "Directory containing the expanded example pack (examples/<pack>)"
  katalog_path:
    description: "Path to the katalog.yaml file (after init/kompose)"
  crd_path:
    description: "Path to the CRD YAML file (only if init=true)"
  cr_path:
    description: "Path to the CR YAML file (only if init=true)"
  example_dir:
    description: "Directory containing the chosen example"
  namespace:
    description: "Kubernetes namespace used for generated resources (default: orkestra-system)"
  registry_file:
    description: "Path to the generated registry file (pkg/runtime/zz_generated_runtime_registry.go)"

runs:
  using: "docker"
  image: "Dockerfile"
  args:
    - ${{ inputs.katalog }}
    - ${{ inputs.init }}
    - ${{ inputs.pack }}
    - ${{ inputs.example-subdir }}
    - ${{ inputs.ork-version }}
    - ${{ inputs.output-dir }}
    - ${{ inputs.kompose }}
    - ${{ inputs.validate }}
    - ${{ inputs.template }}
    - ${{ inputs.generate-rbac }}
    - ${{ inputs.generate-configmap }}
    - ${{ inputs.generate-bundle }}
    - ${{ inputs.namespace }}
    - ${{ inputs.generate-registry }}