name: "Orkestra CI"
description: "Run Orkestra CLI commands in CI with versioned reproducibility"

inputs:
  katalog:
    description: "Path to existing katalog.yaml or komposer.yaml (optional, if not provided, a new operator will be initialized)"
    required: false
    default: ""

  pack:
    description: "Pack to use when initializing a new operator (beginner, intermediate, advanced, use-cases)"
    required: false
    default: "beginner"

  example-subdir:
    description: "Subdirectory under examples/<pack>/ containing the katalog, CRD, and CR (e.g., '01-hello-website')"
    required: false
    default: ""

  ork-version:
    description: "Version of Ork CLI to use (e.g. v1.2.3, latest)"
    required: false
    default: "latest"

  output-dir:
    description: "Directory to write artifacts into"
    required: false
    default: "orkestra-artifacts"

  kompose:
    description: "Run 'ork kompose' before other steps"
    required: false
    default: "false"

  validate:
    description: "Run 'ork validate'"
    required: false
    default: "false"

  template:
    description: "Run 'ork template'"
    required: false
    default: "false"

  generate-rbac:
    description: "Run 'ork generate rbac'"
    required: false
    default: "false"

  generate-configmap:
    description: "Run 'ork generate configmap'"
    required: false
    default: "false"

  generate-bundle:
    description: "Run 'ork generate bundle'"
    required: false
    default: "false"

outputs:
  komposed_katalog:
    description: "Path to the komposed katalog.yaml"
  validate_log:
    description: "Path to validation log"
  template_dir:
    description: "Directory containing rendered templates"
  rbac_file:
    description: "Generated RBAC YAML file"
  configmap_file:
    description: "Generated ConfigMap YAML file"
  bundle_file:
    description: "Generated bundle YAML file"
  init_dir:
    description: "Root directory of the initialized operator"
  operator_dir:
    description: "Directory containing the expanded example pack (examples/<pack>)"
  katalog_path:
    description: "Path to the katalog.yaml file (after kompose/init)"
  crd_path:
    description: "Path to the CRD YAML file (after init)"
  cr_path:
    description: "Path to the CR YAML file (after init)"
  example_dir:
    description: "Directory containing the chosen example (e.g., .../01-hello-website)"

runs:
  using: "docker"
  image: "Dockerfile"
  args:
    - ${{ inputs.katalog }}
    - ${{ inputs.pack }}
    - ${{ inputs.example-subdir }}
    - ${{ inputs.ork-version }}
    - ${{ inputs.output-dir }}
    - ${{ inputs.kompose }}
    - ${{ inputs.validate }}
    - ${{ inputs.template }}
    - ${{ inputs.generate-rbac }}
    - ${{ inputs.generate-configmap }}
    - ${{ inputs.generate-bundle }}